[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/library"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

[[redirects]]
  from = "/start"
  to = "/Awakening-Regeneration.html"
  status = 301

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/films"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

[[redirects]]
  from = "/guides"
  to = "/Awakening-Regeneration.html"
  status = 301

[[redirects]]
  from = "/Awakening_Eden_Regenerative_Film_Resource_Library_updated.html"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

# Clear guide aliases for the final library
[[redirects]]
  from = "/Regeneration-101-Field-Guide.html"
  to = "/Awakening-Regeneration.html"
  status = 301
  force = true

[[redirects]]
  from = "/Regeneration-101-Regenerate-Your-Land.pdf"
  to = "/Awakening-Regeneration-Guide.pdf"
  status = 301
  force = true

[[redirects]]
  from = "/awakening-regeneration"
  to = "/Awakening-Regeneration.html"
  status = 200

[[redirects]]
  from = "/thriving"
  to = "/Thriving-in-These-Times.html"
  status = 200


[[redirects]]
  from = "/journal"
  to = "/journal.html"
  status = 301

[[redirects]]
  from = "/water"
  to = "/journal.html#water-is-love"
  status = 301
