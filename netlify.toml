[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/library"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

[[redirects]]
  from = "/start"
  to = "/Regeneration-101-Field-Guide.html"
  status = 301

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/films"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301

[[redirects]]
  from = "/guides"
  to = "/Regeneration-101-Field-Guide.html"
  status = 301

[[redirects]]
  from = "/Awakening_Eden_Regenerative_Film_Resource_Library_updated.html"
  to = "/awakening_eden_regenerative_film_resource_library_updated.html"
  status = 301
